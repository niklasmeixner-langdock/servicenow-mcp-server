<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ServiceNow Form</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 16px;
        background: var(--background, #ffffff);
        color: var(--foreground, #1a1a1a);
      }
      .form-container {
        max-width: 600px;
        margin: 0 auto;
      }
      .form-header {
        margin-bottom: 20px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border, #e5e5e5);
      }
      .form-header h1 {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .form-header p {
        font-size: 13px;
        color: var(--muted-foreground, #666);
      }
      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 6px;
      }
      .form-group label .required {
        color: #dc2626;
        margin-left: 2px;
      }
      .form-group input,
      .form-group textarea,
      .form-group select {
        width: 100%;
        padding: 8px 12px;
        font-size: 14px;
        border: 1px solid var(--border, #d1d5db);
        border-radius: 6px;
        background: var(--input-background, #fff);
        color: var(--foreground, #1a1a1a);
      }
      .form-group input:focus,
      .form-group textarea:focus,
      .form-group select:focus {
        outline: none;
        border-color: #3b82f6;
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
      }
      .form-group textarea {
        min-height: 80px;
        resize: vertical;
      }
      .form-group input[type="checkbox"] {
        width: auto;
        margin-right: 8px;
      }
      .checkbox-wrapper {
        display: flex;
        align-items: center;
      }
      .hint {
        font-size: 12px;
        color: var(--muted-foreground, #666);
        margin-top: 4px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 20px;
        font-size: 14px;
        font-weight: 500;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.2s;
      }
      .btn-primary {
        background: #3b82f6;
        color: white;
      }
      .btn-primary:hover {
        background: #2563eb;
      }
      .btn-primary:disabled {
        background: #93c5fd;
        cursor: not-allowed;
      }
      .btn-secondary {
        background: var(--secondary, #f3f4f6);
        color: var(--foreground, #1a1a1a);
        margin-right: 8px;
      }
      .actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 24px;
        padding-top: 16px;
        border-top: 1px solid var(--border, #e5e5e5);
      }
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
        color: var(--muted-foreground, #666);
      }
      .loading::after {
        content: "";
        width: 20px;
        height: 20px;
        margin-left: 10px;
        border: 2px solid var(--border, #e5e5e5);
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .success {
        padding: 16px;
        background: #dcfce7;
        border: 1px solid #86efac;
        border-radius: 8px;
        color: #166534;
      }
      .error {
        padding: 16px;
        background: #fee2e2;
        border: 1px solid #fca5a5;
        border-radius: 8px;
        color: #991b1b;
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <div id="content">
        <div class="loading">Loading form...</div>
      </div>
    </div>

    <script type="module">
      // MCP App class for communication
      class App {
        constructor(options) {
          this.name = options.name;
          this.version = options.version;
          this.ontoolresult = null;
          this._messageId = 0;
          this._pendingRequests = new Map();
        }

        connect() {
          window.addEventListener("message", (event) => {
            const message = event.data;
            // Handle initial render data from MCP Apps host
            if (
              message.type === "renderData" &&
              message.data &&
              this.onrenderdata
            ) {
              this.onrenderdata(message.data);
            }
            // Handle tool result (legacy pattern)
            if (message.type === "toolResult" && this.ontoolresult) {
              this.ontoolresult(message.result);
            }
            if (message.id && this._pendingRequests.has(message.id)) {
              const { resolve } = this._pendingRequests.get(message.id);
              this._pendingRequests.delete(message.id);
              resolve(message.result);
            }
          });
          // Notify host that we're ready
          window.parent.postMessage({ type: "appReady", name: this.name }, "*");
        }

        async callServerTool(params) {
          const id = ++this._messageId;
          return new Promise((resolve, reject) => {
            this._pendingRequests.set(id, { resolve, reject });
            window.parent.postMessage(
              {
                type: "callTool",
                id,
                name: params.name,
                arguments: params.arguments,
              },
              "*",
            );
          });
        }
      }

      const app = new App({ name: "ServiceNow Form", version: "1.0.0" });
      const contentEl = document.getElementById("content");

      let currentTable = "";
      let formFields = [];

      // Check for embedded schema (self-contained mode for Claude Visualizer)
      if (window.FORM_SCHEMA) {
        currentTable = window.FORM_SCHEMA.table;
        formFields = window.FORM_SCHEMA.fields;
        renderForm(window.FORM_SCHEMA);
      }

      // Handle initial render data from MCP Apps host (via _meta)
      app.onrenderdata = (data) => {
        try {
          if (data.table && data.fields) {
            currentTable = data.table;
            formFields = data.fields;
            renderForm(data);
          }
        } catch (e) {
          console.error("Error processing render data:", e);
        }
      };

      // Handle incoming tool results (fallback for MCP app mode)
      app.ontoolresult = (result) => {
        try {
          const textContent = result.content?.find(
            (c) => c.type === "text",
          )?.text;
          if (textContent) {
            const data = JSON.parse(textContent);
            if (data.table && data.fields) {
              currentTable = data.table;
              formFields = data.fields;
              renderForm(data);
            } else if (data.sys_id) {
              // Successful submission
              renderSuccess(data);
            }
          }
        } catch (e) {
          console.error("Error processing tool result:", e);
        }
      };

      function renderForm(schema) {
        const editableFields = schema.fields.filter((f) => !f.readOnly);

        let html = `
        <div class="form-header">
          <h1>${schema.table} Form</h1>
          <p>Fill in the fields below to create a new record</p>
        </div>
        <form id="servicenow-form">
      `;

        for (const field of editableFields) {
          html += renderField(field);
        }

        html += `
        <div class="actions">
          <button type="button" class="btn btn-secondary" onclick="resetForm()">Reset</button>
          <button type="submit" class="btn btn-primary" id="submit-btn">Submit</button>
        </div>
        </form>
      `;

        contentEl.innerHTML = html;

        document
          .getElementById("servicenow-form")
          .addEventListener("submit", handleSubmit);
      }

      function renderField(field) {
        const required = field.required
          ? '<span class="required">*</span>'
          : "";
        const maxLength = field.maxLength
          ? `maxlength="${field.maxLength}"`
          : "";
        const defaultVal = field.defaultValue || "";

        let input = "";

        switch (field.inputType) {
          case "textarea":
            input = `<textarea name="${field.name}" id="${field.name}" ${maxLength} ${field.required ? "required" : ""}>${defaultVal}</textarea>`;
            break;

          case "select":
            const options = (field.choices || [])
              .map((c) => `<option value="${c.value}">${c.label}</option>`)
              .join("");
            input = `<select name="${field.name}" id="${field.name}" ${field.required ? "required" : ""}>
            <option value="">-- Select --</option>
            ${options}
          </select>`;
            break;

          case "boolean":
            input = `<div class="checkbox-wrapper">
            <input type="checkbox" name="${field.name}" id="${field.name}" value="true" ${defaultVal === "true" ? "checked" : ""}>
            <label for="${field.name}" style="margin-bottom: 0">${field.label}</label>
          </div>`;
            return `<div class="form-group">${input}</div>`;

          case "number":
            input = `<input type="number" name="${field.name}" id="${field.name}" value="${defaultVal}" ${field.required ? "required" : ""}>`;
            break;

          case "date":
            input = `<input type="date" name="${field.name}" id="${field.name}" value="${defaultVal}" ${field.required ? "required" : ""}>`;
            break;

          case "datetime":
            input = `<input type="datetime-local" name="${field.name}" id="${field.name}" value="${defaultVal}" ${field.required ? "required" : ""}>`;
            break;

          case "reference":
            input = `<input type="text" name="${field.name}" id="${field.name}" placeholder="Enter sys_id${field.referenceTable ? " for " + field.referenceTable : ""}" value="${defaultVal}" ${maxLength} ${field.required ? "required" : ""}>`;
            break;

          default:
            input = `<input type="text" name="${field.name}" id="${field.name}" value="${defaultVal}" ${maxLength} ${field.required ? "required" : ""}>`;
        }

        let hint = "";
        if (field.hint) {
          hint = `<div class="hint">${field.hint}</div>`;
        } else if (field.referenceTable) {
          hint = `<div class="hint">Reference to ${field.referenceTable}</div>`;
        }

        return `
        <div class="form-group">
          <label for="${field.name}">${field.label}${required}</label>
          ${input}
          ${hint}
        </div>
      `;
      }

      async function handleSubmit(e) {
        e.preventDefault();
        const form = e.target;
        const submitBtn = document.getElementById("submit-btn");
        submitBtn.disabled = true;
        submitBtn.textContent = "Submitting...";

        const formData = new FormData(form);
        const data = {};

        for (const field of formFields) {
          if (field.readOnly) continue;

          if (field.inputType === "boolean") {
            data[field.name] = formData.has(field.name) ? "true" : "false";
          } else {
            const value = formData.get(field.name);
            if (value) {
              data[field.name] = value;
            }
          }
        }

        try {
          const result = await app.callServerTool({
            name: "submit_form",
            arguments: {
              table: currentTable,
              data: data,
            },
          });

          const textContent = result.content?.find(
            (c) => c.type === "text",
          )?.text;
          if (textContent) {
            const responseData = JSON.parse(textContent);
            if (responseData.sys_id) {
              renderSuccess(responseData);
            } else {
              throw new Error("Unexpected response format");
            }
          }
        } catch (error) {
          renderError(error.message || "Failed to submit form");
        }
      }

      function renderSuccess(data) {
        contentEl.innerHTML = `
        <div class="success">
          <h3>Record Created Successfully</h3>
          <p style="margin-top: 8px">Record ID: <strong>${data.sys_id}</strong></p>
          ${data.number ? `<p>Number: <strong>${data.number}</strong></p>` : ""}
        </div>
        <div class="actions" style="border-top: none; padding-top: 16px;">
          <button type="button" class="btn btn-primary" onclick="location.reload()">Create Another</button>
        </div>
      `;
      }

      function renderError(message) {
        const submitBtn = document.getElementById("submit-btn");
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = "Submit";
        }

        const errorDiv = document.createElement("div");
        errorDiv.className = "error";
        errorDiv.style.marginBottom = "16px";
        errorDiv.textContent = message;

        const existingError = contentEl.querySelector(".error");
        if (existingError) {
          existingError.remove();
        }

        const form = document.getElementById("servicenow-form");
        if (form) {
          form.insertBefore(errorDiv, form.firstChild);
        }
      }

      window.resetForm = function () {
        const form = document.getElementById("servicenow-form");
        if (form) form.reset();
      };

      // Connect to host
      app.connect();
    </script>
  </body>
</html>
